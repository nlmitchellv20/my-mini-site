<html>
  <head>
    <title>My Mini Website</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -1;
      }
      .content {
        position: relative;
        z-index: 1;
        color: white;
        text-align: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.5); /* Semi-transparent overlay for readability */
        margin: 50px;
        border-radius: 10px;
      }
      img {
        opacity: 0.2; /* Makes the semi-transparent */
        margin-bottom: 50px; /* Adds space below the image */
      }
    </style>
  </head>
  <body>
    <video autoplay loop muted>
      <source src="batmanvid.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="content">
      <h1 style="font-size: 120px; color: darkred;">Who Are You?</h1>
      <p style="color: darkgoldenrod;">Your favorite winged vigilante... The Batman. Before this latest remake, I didn't think that another Batman movie was necessary or good enough to watch. I was wrong! </p>
      <img src="bat2.jpg" alt="I'm Vengeance!" />
      <a href="https://www.youtube.com/watch?v=mqqft2x_Aa4">The Trailer</a>
    </div>
  </body>
</html>
